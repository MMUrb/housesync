# Cloud-Mac iOS build for HouseSync. Build + sign + ship the iOS app from
# Windows, no local Mac. Runs on Codemagic (https://codemagic.io).
#
# Capacitor 8 uses Swift Package Manager (no CocoaPods / Podfile), so we build
# the .xcodeproj directly and Xcode resolves the Swift packages automatically.
#
# ONE-TIME setup in the Codemagic UI before the TestFlight workflow runs:
#   1. Connect this GitHub repo (MMUrb/housesync).
#   2. Team settings -> Integrations -> App Store Connect: add an API key
#      (App Store Connect -> Users and Access -> Integrations -> generate a key),
#      name it, and put that name in `integrations.app_store_connect` below.
#   3. Create the app in App Store Connect (bundle id uk.co.housesync), then put
#      its numeric Apple ID into APP_STORE_APPLE_ID below.

workflows:
  ios-housesync:
    name: HouseSync iOS (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 60
    cache:
      cache_paths:
        - $HOME/.signing      # persist the generated signing key across builds
    integrations:
      app_store_connect: HouseSync ASC Key   # <- the name of your API key in Codemagic
    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "uk.co.housesync"
        APP_STORE_APPLE_ID: 6783905558        # HouseSync app's Apple ID (App Store Connect)
      node: 22
      xcode: latest
    scripts:
      - name: Install node dependencies
        script: npm ci
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Initialize keychain
        script: keychain initialize
      - name: Create / fetch iOS signing files
        script: |
          # The signing certificate key is generated and kept in the build cache
          # (Codemagic env vars were unusable from this machine's clipboard).
          # First run generates it; later runs reuse it, so fetch-signing-files
          # reuses the same distribution certificate instead of making new ones.
          KEY="$HOME/.signing/cert_key.pem"
          mkdir -p "$HOME/.signing"
          if [ -s "$KEY" ] && openssl pkey -in "$KEY" -noout 2>/dev/null; then
            echo "reusing cached signing key"
          else
            echo "generating a new signing key"
            openssl genrsa -out "$KEY" 2048
          fi
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --platform IOS \
            --certificate-key=@file:"$KEY" \
            --create
      - name: Add signing certificate to keychain
        script: keychain add-certificates
      - name: Apply provisioning profile to the Xcode project
        script: |
          set -x
          xcode-project use-profiles
          echo "==== signing build settings after use-profiles ===="
          xcodebuild -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" -showBuildSettings 2>/dev/null \
            | grep -iE "CODE_SIGN_STYLE|DEVELOPMENT_TEAM|PROVISIONING_PROFILE|CODE_SIGN_IDENTITY" || true
      - name: Auto-increment build number
        script: |
          LATEST=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" || echo 0)
          cd ios/App
          agvtool new-version -all $(($LATEST + 1))
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        # Upload to App Store Connect only. Internal TestFlight testers can use
        # the build immediately. External testing needs Beta App Review (test
        # info + a demo login), set that up in the App Store Connect UI and flip
        # this back to true when ready for outside testers.
        submit_to_testflight: false

  # Run THIS one now (before Apple enrolment) to confirm the iOS project
  # compiles cleanly on a Mac. No Apple account, signing or upload involved.
  ios-build-check:
    name: HouseSync iOS build check (unsigned)
    instance_type: mac_mini_m2
    max_build_duration: 45
    environment:
      node: 22
      xcode: latest
    scripts:
      - name: Install node dependencies
        script: npm ci
      - name: Sync Capacitor iOS
        script: npx cap sync ios
      - name: Build without signing
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            build \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
